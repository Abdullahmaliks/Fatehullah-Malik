<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fatehullah Malik — Business Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Jost:wght@400;500;600&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --charcoal: #1c1c1c;
    --charcoal-2: #262626;
    --green: #3e7f22;
    --green-light: #5a9c3a;
    --ivory: #f4f2ec;
    --gray: #9a9a92;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body{
    background:#3a3a3a;
    min-height:100vh;
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:center;
    gap:40px;
    padding:60px 20px;
    font-family:'Jost',sans-serif;
  }
  .card{
    width:89mm;
    height:51mm;
    position:relative;
    overflow:hidden;
    border-radius:3px;
    box-shadow:0 20px 45px rgba(0,0,0,0.45);
  }

  /* ---------- FRONT ---------- */
  .front{
    background:
      linear-gradient(135deg, transparent 0%, transparent 58%, var(--green) 58%, var(--green-light) 100%),
      var(--charcoal);
  }
  .front::before{
    /* faint hexagon watermark echoing the logo */
    content:"";
    position:absolute;
    right:-38mm;
    top:-14mm;
    width:70mm;
    height:70mm;
    background:
      conic-gradient(from 0deg, transparent 0 60deg, rgba(255,255,255,0.035) 60deg 120deg, transparent 120deg 360deg);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    opacity:0.6;
  }
  .front-content{
    position:relative;
    z-index:2;
    height:100%;
    padding:6mm 7mm;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
  }
  .top-row{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
  }
  .logo-mark{
    width:9mm;
    height:9mm;
    object-fit:contain;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.4));
  }
  .co-name-ar{
    font-family:'Cairo', sans-serif;
    font-weight:700;
    font-size:3.6mm;
    color:var(--ivory);
    letter-spacing:0.3px;
    text-align:right;
    direction:rtl;
    line-height:1.3;
  }
  .co-name-en{
    font-family:'Jost',sans-serif;
    font-size:1.8mm;
    letter-spacing:2.2px;
    color:var(--gray);
    text-transform:uppercase;
    text-align:right;
    margin-top:0.8mm;
  }
  .co-division{
    font-family:'Jost',sans-serif;
    font-weight:500;
    font-size:1.8mm;
    letter-spacing:1.6px;
    text-transform:uppercase;
    color:var(--ivory);
    text-align:right;
    margin-top:0.9mm;
  }
  .name-block{
    margin-top:2mm;
  }
  .name{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size:8.2mm;
    color:var(--ivory);
    letter-spacing:0.4px;
    line-height:1;
  }
  .title{
    font-family:'Jost',sans-serif;
    font-weight:500;
    font-size:2.5mm;
    letter-spacing:2.6px;
    text-transform:uppercase;
    color:var(--green-light);
    margin-top:1.6mm;
  }
  .divider{
    width:14mm;
    height:0.5mm;
    background:var(--green-light);
    margin:2.6mm 0;
  }
  .contact{
    display:flex;
    flex-direction:column;
    gap:1.1mm;
  }
  .contact-row{
    display:flex;
    align-items:center;
    gap:2mm;
    font-size:2.6mm;
    color:var(--ivory);
    letter-spacing:0.5px;
    font-family:'Jost',sans-serif;
    font-weight:400;
    text-decoration:none;
  }
  .wa-icon{
    display:inline-flex;
    width:3mm;
    height:3mm;
    color:var(--green-light);
  }
  .contact-row .glyph{
    color:var(--green-light);
    font-size:2.6mm;
    width:3.5mm;
    display:inline-block;
  }

  /* ---------- BACK ---------- */
  .back{
    background: var(--charcoal-2);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .back::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(135deg, transparent 0%, transparent 58%, var(--green) 58%, var(--green-light) 100%);
    opacity:0.94;
    clip-path: polygon(100% 100%, 100% 45%, 55% 100%);
  }
  .back-content{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3mm;
  }
  .back-logo{
    width:16mm;
    height:16mm;
    object-fit:contain;
  }
  .back-ar{
    font-family:'Cairo', sans-serif;
    font-weight:700;
    font-size:4.2mm;
    color:var(--ivory);
    direction:rtl;
  }
  .back-tagline{
    font-family:'Jost',sans-serif;
    font-size:2mm;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--gray);
  }

  @media print{
    body{ background:#fff; padding:0; gap:0; }
    .card{ box-shadow:none; page-break-inside:avoid; }
  }
</style>
</head>
